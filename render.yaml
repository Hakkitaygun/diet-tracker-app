databases:
  - name: diet-tracker-db
    plan: free

services:
  - type: web
    name: diet-tracker-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: diet-tracker-db
          property: connectionString
